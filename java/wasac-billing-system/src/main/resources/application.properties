spring.application.name=wasac-billing-system
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/wasac_billing
spring.datasource.username=paulin
spring.datasource.password=paulin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# Jackson
spring.jackson.serialization.indent-output=true
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null

# JWT
app.jwt.secret=d2FzYWNCaWxsaW5nU3lzdGVtMjAyNE5hdGlvbmFsRXhhbVByb2plY3RTZWNYRVQ=
app.jwt.expiration-ms=86400000

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
